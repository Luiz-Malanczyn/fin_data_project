# List of assets tracked by the framework.
# To add a new asset, add an entry here -- no code changes required.
assets:
  - id: PETR4
    type: stock
    source: brapi
    exchange: B3
    active: true
    params:
      range: 5d
      interval: 1d

  - id: MGLU3
    type: stock
    source: brapi
    exchange: B3
    active: true
