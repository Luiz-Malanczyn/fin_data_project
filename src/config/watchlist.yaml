# List of assets tracked by the framework.
# To add a new asset, add an entry here -- no code changes required.
assets:
  - id: PETR4
    type: stock
    source: brapi
    exchange: B3
    active: true
    params:
      range: 5d
      interval: 1d

  - id: MGLU3
    type: stock
    source: brapi
    exchange: B3
    active: true
    params:
      range: 5d
      interval: 1d

  # 10 largest B3 companies by market cap, added to test whether directional
  # signal found on PETR4/MGLU3 generalizes across sectors, or is specific
  # to those two. brapi.dev's free (no-token) tier only allows a handful of
  # "demo" tickers (PETR4/MGLU3/VALE3/ITUB4 among them) -- everything else
  # returns 401 MISSING_TOKEN, so the rest use the Yahoo Finance source
  # registered earlier for exactly this situation.
  - id: VALE3
    type: stock
    source: brapi
    exchange: B3
    active: true
    params:
      range: 5d
      interval: 1d

